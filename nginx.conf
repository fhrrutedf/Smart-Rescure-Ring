# ============================================================
#  nginx.conf — Smart Rescuer Ring  |  Hostinger VPS
# ============================================================
#
# HOW TO INSTALL ON VPS:
#
#   1. Copy this file:
#      sudo cp nginx.conf /etc/nginx/sites-available/smart-rescuer-ring
#
#   2. Enable the site:
#      sudo ln -s /etc/nginx/sites-available/smart-rescuer-ring \
#                 /etc/nginx/sites-enabled/smart-rescuer-ring
#
#   3. Remove the default site (optional but recommended):
#      sudo rm -f /etc/nginx/sites-enabled/default
#
#   4. Test & reload:
#      sudo nginx -t && sudo systemctl reload nginx
#
#   5. (Optional) Add free SSL with Certbot:
#      sudo apt install certbot python3-certbot-nginx -y
#      sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
# ============================================================

# ── Rate limiting zone (protection against abuse) ────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

server {
    listen 80;
    listen [::]:80;

    # ── Replace with your actual domain or VPS IP ────────────
    # If using a domain: server_name yourdomain.com www.yourdomain.com;
    # If using bare IP:  server_name _;
    server_name _;

    # ── Logging ──────────────────────────────────────────────
    access_log /var/log/nginx/smart-rescuer-access.log;
    error_log  /var/log/nginx/smart-rescuer-error.log warn;

    # ── Security headers ─────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-Frame-Options         "SAMEORIGIN"      always;
    add_header X-XSS-Protection        "1; mode=block"   always;
    add_header Referrer-Policy         "no-referrer-when-downgrade" always;

    # ── Upload size (matches Express 50 mb limit) ─────────────
    client_max_body_size 52m;

    # ── API routes — proxy to Express + rate-limit ────────────
    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Longer timeout for AI image analysis (Gemini can be slow)
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;
    }

    # ── TTS audio responses — longer timeout ──────────────────
    location /api/tts {
        limit_req zone=api_limit burst=5 nodelay;

        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;
    }

    # ── All other traffic → Express (landing page, manifest, dashboard) ──
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
        proxy_connect_timeout 10s;
    }
}
