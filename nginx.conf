# ============================================================
#  nginx.conf — Smart Rescuer Ring  |  Hostinger VPS
#  Ubuntu 24.04  |  Port 80 → static dist/ + proxy to :5001
# ============================================================
#
# HOW TO APPLY:
#   sudo cp nginx.conf /etc/nginx/sites-available/smart-rescuer-ring
#   sudo ln -sf /etc/nginx/sites-available/smart-rescuer-ring \
#               /etc/nginx/sites-enabled/smart-rescuer-ring
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

server {
    listen 80;
    listen [::]:80;

    server_name 76.13.40.84 _;

    # ── Root: point directly at the Expo web build output ────
    root /var/www/smart-rescuer-ring/dist;
    index index.html;

    # ── Logging ──────────────────────────────────────────────
    access_log /var/log/nginx/smart-rescuer-access.log;
    error_log  /var/log/nginx/smart-rescuer-error.log warn;

    # ── Security headers ─────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"    always;
    add_header X-Frame-Options         "SAMEORIGIN" always;
    add_header X-XSS-Protection        "1; mode=block" always;

    # ── Upload size limit (matches Express 50 mb body limit) ─
    client_max_body_size 52m;

    # ── 1. TTS endpoint — longer timeout, rate-limited ───────
    location /api/tts {
        limit_req zone=api_limit burst=5 nodelay;

        proxy_pass         http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
        proxy_connect_timeout 10s;
    }

    # ── 2. All API routes → proxy to Express :5001 ───────────
    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass         http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Generous timeout for Gemini AI image analysis
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
        proxy_connect_timeout 10s;
    }

    # ── 3. Expo manifest + landing page → Express ────────────
    location ~ ^/(manifest|android|ios|dashboard)$ {
        proxy_pass         http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   expo-platform     $http_expo_platform;

        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
        proxy_connect_timeout 10s;
    }

    # ── 4. Expo _expo/ JS bundles — served as static files ───
    location /_expo/ {
        # These are hashed filenames; cache aggressively
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── 5. Static assets (images, fonts, icons) ──────────────
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ── 6. SPA catch-all — serve index.html for all routes ───
    #    This makes React Router / Expo Router work on the web
    location / {
        try_files $uri $uri/ /index.html;
    }
}
